# NOTE: This is the extended test workflow.
# For the primary CI workflow with lint + test, see ci.yml
name: Tests (Extended)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Phase 90-02: Security scanning with Bandit SAST
  security:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Bandit
      run: pip install bandit

    - name: Run Bandit security scan
      run: |
        bandit -r src/f1d/ -c pyproject.toml --severity-level medium
      continue-on-error: false

    - name: Upload security report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-security-report
        path: bandit-report.txt
        retention-days: 30

  test:
    needs: security
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-mock

    - name: Type check with mypy
      run: |
        mypy src/f1d/shared --config-file pyproject.toml

    - name: Run unit and integration tests (skip E2E)
      run: |
        pytest tests/ -m "not e2e" \
          --cov=src/f1d \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term \
          --cov-report=json \
          --cov-fail-under=60 \
          -v
      env:
        PYTHONPATH: ${{ github.workspace }}/src

    - name: Coverage Summary
      run: |
        echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Parse coverage.json for summary
        python - << 'EOF'
        import json
        import sys
        from pathlib import Path

        coverage_file = Path("coverage.json")
        if not coverage_file.exists():
            sys.exit(0)

        with open(coverage_file) as f:
            data = json.load(f)

        totals = data.get("totals", {})
        files = data.get("files", [])

        print("## Coverage Summary")
        print(f"| Metric | Coverage |")
        print(f"|--------|----------|")
        print(f"| Line Coverage | {totals.get('line_covered', 0)}/{totals.get('line_total', 0)} ({totals.get('line_percent', 0):.1f}%) |")
        print(f"| Branch Coverage | {totals.get('branch_covered', 0)}/{totals.get('branch_total', 0)} ({totals.get('branch_percent', 0):.1f}%) |")

        # Critical shared modules
        critical_files = [
            "panel_ols.py",
            "iv_regression.py",
        ]

        print("\n### Critical Modules (Tier 1 - Target 90%+)")
        for file_info in files:
            filename = Path(file_info["name"]).name
            if filename in critical_files:
                summary = file_info.get("summary", {})
                line_pct = summary.get("percent_covered", 0)
                status = "OK" if line_pct >= 90 else "NEEDS ATTENTION"
                print(f"- **{filename}**: {line_pct:.1f}% [{status}]")

        # Important shared modules
        important_files = [
            "data_validation.py",
            "path_utils.py",
            "chunked_reader.py",
        ]

        print("\n### Important Modules (Tier 2 - Target 80%+)")
        for file_info in files:
            filename = Path(file_info["name"]).name
            if filename in important_files:
                summary = file_info.get("summary", {})
                line_pct = summary.get("percent_covered", 0)
                status = "OK" if line_pct >= 80 else "NEEDS ATTENTION"
                print(f"- **{filename}**: {line_pct:.1f}% [{status}]")
        EOF

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload coverage as artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: htmlcov/
        retention-days: 30

    - name: Upload test results as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          .pytest_cache/
          test-results/
        retention-days: 30

  e2e-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']
    needs: test
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Run E2E tests
      run: |
        pytest tests/ -m e2e -v --timeout=1200

    - name: Upload E2E test logs as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-test-logs-${{ matrix.python-version }}
        path: |
          .pytest_cache/
          test-results/
          logs/
        retention-days: 30
