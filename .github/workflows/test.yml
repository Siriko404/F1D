name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-mypy

    - name: Type check with mypy
      run: |
        # Run mypy on shared modules only
        mypy 2_Scripts/shared/financial_utils.py || true
        mypy 2_Scripts/shared/panel_ols.py || true
        mypy 2_Scripts/shared/iv_regression.py || true
        mypy 2_Scripts/shared/data_validation.py || true
        # Or use pytest-mypy
        pytest tests/unit/test_types.py -v -m mypy_testing || true
      continue-on-error: true  # Don't fail CI initially

    - name: Run unit and integration tests (skip E2E)
      run: |
        pytest tests/ -m "not e2e" \
          --cov=2_Scripts \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term \
          --cov-report=json \
          --cov-fail-under=60 \
          -v
      env:
        PYTHONPATH: ${{ github.workspace }}/2_Scripts

    - name: Coverage Summary
      run: |
        echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Parse coverage.json for summary
        python - << 'EOF'
        import json
        import sys
        from pathlib import Path

        coverage_file = Path("coverage.json")
        if not coverage_file.exists():
            sys.exit(0)

        with open(coverage_file) as f:
            data = json.load(f)

        totals = data.get("totals", {})
        files = data.get("files", [])

        print("## Coverage Summary")
        print(f"| Metric | Coverage |")
        print(f"|--------|----------|")
        print(f"| Line Coverage | {totals.get('line_covered', 0)}/{totals.get('line_total', 0)} ({totals.get('line_percent', 0):.1f}%) |")
        print(f"| Branch Coverage | {totals.get('branch_covered', 0)}/{totals.get('branch_total', 0)} ({totals.get('branch_percent', 0):.1f}%) |")

        # Critical shared modules
        critical_files = [
            "financial_utils.py",
            "panel_ols.py",
            "iv_regression.py",
        ]

        print("\n### Critical Modules (Tier 1 - Target 90%+)")
        for file_info in files:
            filename = Path(file_info["name"]).name
            if filename in critical_files:
                summary = file_info.get("summary", {})
                line_pct = summary.get("percent_covered", 0)
                status = "OK" if line_pct >= 90 else "NEEDS ATTENTION"
                print(f"- **{filename}**: {line_pct:.1f}% [{status}]")

        # Important shared modules
        important_files = [
            "data_validation.py",
            "path_utils.py",
            "chunked_reader.py",
        ]

        print("\n### Important Modules (Tier 2 - Target 80%+)")
        for file_info in files:
            filename = Path(file_info["name"]).name
            if filename in important_files:
                summary = file_info.get("summary", {})
                line_pct = summary.get("percent_covered", 0)
                status = "OK" if line_pct >= 80 else "NEEDS ATTENTION"
                print(f"- **{filename}**: {line_pct:.1f}% [{status}]")
        EOF

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false  # Keep false initially, enable after baseline established
        token: ${{ secrets.CODECOV_TOKEN }}  # Optional for private repos
      continue-on-error: true

    - name: Upload coverage as artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: htmlcov/
        retention-days: 30

    - name: Upload test results as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          .pytest_cache/
          test-results/
        retention-days: 30
        continue-on-error: true

  e2e-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']  # Run E2E on a single Python version for speed
    needs: test  # Only run E2E if unit/integration tests pass
    timeout-minutes: 30  # Extended timeout for E2E tests

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Run E2E tests
      run: |
        pytest tests/ -m e2e -v --timeout=1200  # 20-minute timeout per test

    - name: Upload E2E test logs as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-test-logs-${{ matrix.python-version }}
        path: |
          .pytest_cache/
          test-results/
          3_Logs/
        retention-days: 30
        continue-on-error: true
