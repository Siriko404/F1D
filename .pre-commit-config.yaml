# Pre-commit hooks configuration
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
#
# IMPORTANT: Hook versions must match CI workflow versions
# - ruff v0.9.0 -> matches .github/workflows/ci.yml
# - mypy v1.14.1 -> matches .github/workflows/ci.yml
# - Config file: pyproject.toml (same as CI)
#
# When updating hook versions, update CI workflow accordingly.
#
# Installation:
#   pip install pre-commit
#   pre-commit install
#   pre-commit run --all-files  # First-time run

repos:
  # General file quality
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Whitespace and line endings
      - id: trailing-whitespace
      - id: end-of-file-fixer

      # Config file validation
      - id: check-yaml
        args: [--unsafe]
      - id: check-toml
      - id: check-json

      # File safety
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict

      # Security
      - id: detect-private-key
      - id: debug-statements

  # Ruff - linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      # Linter
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      # Formatter
      - id: ruff-format

  # Type checking with mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.0
          - types-PyYAML
        args: [--config-file=pyproject.toml]
        pass_filenames: false
        entry: mypy src/f1d/shared

# CI configuration (for pre-commit.ci if used)
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
