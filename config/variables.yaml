# =============================================================================
# F1D Variable Source Configuration
# =============================================================================
# This file defines all variable sources for the F1D econometric analysis.
# Each variable specifies its source location and column mapping.
#
# Path Resolution:
#   - Sources point to parent directories containing timestamped subdirectories
#   - Variable builders automatically find the timestamp subdirectory with the
#     most matching files
#   - File patterns use {year} placeholder for year-partitioned data
#
# Architecture:
#   Stage 1 (Sample):     outputs/1.4_AssembleManifest/{timestamp}/
#   Stage 2 (Text):       outputs/2_Textual_Analysis/2.2_Variables/{timestamp}/
#   Stage 3 (Financial):  outputs/3_Financial_Features/{timestamp}/
#   Stage 4 (Econometric): outputs/econometric/{test_name}/{timestamp}/
# =============================================================================

variables:
  # ===========================================================================
  # STAGE 1: Sample Manifest
  # ===========================================================================
  # Source: src/f1d/sample/assemble_manifest.py
  # Output: Master sample manifest with CEO, firm, and industry identifiers

  manifest:
    stage: 1
    source: "outputs/1.4_AssembleManifest"
    file_name: "master_sample_manifest.parquet"
    columns:
      - file_name
      - ceo_id
      - ceo_name
      - gvkey
      - ff12_code
      - ff12_name
      - start_date
    description: "Master sample manifest with CEO, firm, and industry identifiers"

  # ===========================================================================
  # STAGE 2: Text/Linguistic Variables
  # ===========================================================================
  # Source: src/f1d/text/build_linguistic_variables.py
  # Output: Linguistic variables (uncertainty, sentiment, etc.) per call

  manager_qa_uncertainty:
    stage: 2
    source: "outputs/2_Textual_Analysis/2.2_Variables"
    file_pattern: "linguistic_variables_{year}.parquet"
    column: "Manager_QA_Uncertainty_pct"
    description: "Manager Q&A uncertainty percentage (all managers including CEO)"

  manager_pres_uncertainty:
    stage: 2
    source: "outputs/2_Textual_Analysis/2.2_Variables"
    file_pattern: "linguistic_variables_{year}.parquet"
    column: "Manager_Pres_Uncertainty_pct"
    description: "Manager presentation uncertainty percentage"

  analyst_qa_uncertainty:
    stage: 2
    source: "outputs/2_Textual_Analysis/2.2_Variables"
    file_pattern: "linguistic_variables_{year}.parquet"
    column: "Analyst_QA_Uncertainty_pct"
    description: "Analyst Q&A uncertainty percentage"

  negative_sentiment:
    stage: 2
    source: "outputs/2_Textual_Analysis/2.2_Variables"
    file_pattern: "linguistic_variables_{year}.parquet"
    column: "Entire_All_Negative_pct"
    description: "Entire call negative sentiment percentage"

  entire_all_uncertainty:
    stage: 2
    source: "outputs/2_Textual_Analysis/2.2_Variables"
    file_pattern: "linguistic_variables_{year}.parquet"
    column: "Entire_All_Uncertainty_pct"
    description: "Entire call uncertainty percentage (all speakers)"

  ceo_qa_uncertainty:
    stage: 2
    source: "outputs/2_Textual_Analysis/2.2_Variables"
    file_pattern: "linguistic_variables_{year}.parquet"
    column: "CEO_QA_Uncertainty_pct"
    description: "CEO-only Q&A uncertainty percentage (not full management team)"

  ceo_pres_uncertainty:
    stage: 2
    source: "outputs/2_Textual_Analysis/2.2_Variables"
    file_pattern: "linguistic_variables_{year}.parquet"
    column: "CEO_Pres_Uncertainty_pct"
    description: "CEO-only presentation uncertainty percentage"

  nonceo_manager_qa_uncertainty:
    stage: 2
    source: "outputs/2_Textual_Analysis/2.2_Variables"
    file_pattern: "linguistic_variables_{year}.parquet"
    column: "NonCEO_Manager_QA_Uncertainty_pct"
    description: "Non-CEO manager Q&A uncertainty percentage"

  nonceo_manager_pres_uncertainty:
    stage: 2
    source: "outputs/2_Textual_Analysis/2.2_Variables"
    file_pattern: "linguistic_variables_{year}.parquet"
    column: "NonCEO_Manager_Pres_Uncertainty_pct"
    description: "Non-CEO manager presentation uncertainty percentage"

  cfo_qa_uncertainty:
    stage: 2
    source: "outputs/2_Textual_Analysis/2.1_Tokenized"
    file_pattern: "linguistic_counts_{year}.parquet"
    column: "CFO_QA_Uncertainty_pct"
    description: "CFO-only Q&A uncertainty percentage (computed from token counts)"

  ceo_style_realtime:
    stage: constructed
    source: "outputs/2_Textual_Analysis/2.2_Variables"
    file_pattern: "linguistic_variables_{year}.parquet"
    column: "ClarityStyle_Realtime"
    description: "Rolling EB-shrunk CEO FE, 4-call rolling window, min N=4"

  # ---------------------------------------------------------------------------
  # Tone / Sentiment (Positive & Negative pct per speaker/context)
  # Used by build_ceo_tone_panel.py to derive NetTone = Positive - Negative
  # ---------------------------------------------------------------------------

  manager_qa_positive:
    stage: 2
    source: "outputs/2_Textual_Analysis/2.2_Variables"
    file_pattern: "linguistic_variables_{year}.parquet"
    column: "Manager_QA_Positive_pct"
    description: "Manager Q&A positive sentiment percentage"

  manager_qa_negative:
    stage: 2
    source: "outputs/2_Textual_Analysis/2.2_Variables"
    file_pattern: "linguistic_variables_{year}.parquet"
    column: "Manager_QA_Negative_pct"
    description: "Manager Q&A negative sentiment percentage"

  manager_pres_positive:
    stage: 2
    source: "outputs/2_Textual_Analysis/2.2_Variables"
    file_pattern: "linguistic_variables_{year}.parquet"
    column: "Manager_Pres_Positive_pct"
    description: "Manager presentation positive sentiment percentage"

  manager_pres_negative:
    stage: 2
    source: "outputs/2_Textual_Analysis/2.2_Variables"
    file_pattern: "linguistic_variables_{year}.parquet"
    column: "Manager_Pres_Negative_pct"
    description: "Manager presentation negative sentiment percentage"

  ceo_qa_positive:
    stage: 2
    source: "outputs/2_Textual_Analysis/2.2_Variables"
    file_pattern: "linguistic_variables_{year}.parquet"
    column: "CEO_QA_Positive_pct"
    description: "CEO-only Q&A positive sentiment percentage"

  ceo_qa_negative:
    stage: 2
    source: "outputs/2_Textual_Analysis/2.2_Variables"
    file_pattern: "linguistic_variables_{year}.parquet"
    column: "CEO_QA_Negative_pct"
    description: "CEO-only Q&A negative sentiment percentage"

  ceo_pres_positive:
    stage: 2
    source: "outputs/2_Textual_Analysis/2.2_Variables"
    file_pattern: "linguistic_variables_{year}.parquet"
    column: "CEO_Pres_Positive_pct"
    description: "CEO-only presentation positive sentiment percentage"

  ceo_pres_negative:
    stage: 2
    source: "outputs/2_Textual_Analysis/2.2_Variables"
    file_pattern: "linguistic_variables_{year}.parquet"
    column: "CEO_Pres_Negative_pct"
    description: "CEO-only presentation negative sentiment percentage"

  nonceo_manager_qa_positive:
    stage: 2
    source: "outputs/2_Textual_Analysis/2.2_Variables"
    file_pattern: "linguistic_variables_{year}.parquet"
    column: "NonCEO_Manager_QA_Positive_pct"
    description: "Non-CEO manager Q&A positive sentiment percentage"

  nonceo_manager_qa_negative:
    stage: 2
    source: "outputs/2_Textual_Analysis/2.2_Variables"
    file_pattern: "linguistic_variables_{year}.parquet"
    column: "NonCEO_Manager_QA_Negative_pct"
    description: "Non-CEO manager Q&A negative sentiment percentage"

  analyst_qa_positive:
    stage: 2
    source: "outputs/2_Textual_Analysis/2.2_Variables"
    file_pattern: "linguistic_variables_{year}.parquet"
    column: "Analyst_QA_Positive_pct"
    description: "Analyst Q&A positive sentiment percentage"

  analyst_qa_negative:
    stage: 2
    source: "outputs/2_Textual_Analysis/2.2_Variables"
    file_pattern: "linguistic_variables_{year}.parquet"
    column: "Analyst_QA_Negative_pct"
    description: "Analyst Q&A negative sentiment percentage"

  # ===========================================================================
  # STAGE 3: Financial Variables
  # ===========================================================================
  # Source: src/f1d/financial/v1/3.1_FirmControls.py, 3.2_MarketVariables.py
  # Output: Firm-level controls and market variables per call

  stock_return:
    stage: 3
    source: "outputs/3_Financial_Features"
    file_pattern: "market_variables_{year}.parquet"
    column: "StockRet"
    description: "Annual stock return"

  market_return:
    stage: 3
    source: "outputs/3_Financial_Features"
    file_pattern: "market_variables_{year}.parquet"
    column: "MarketRet"
    description: "Annual market return"

  eps_growth:
    stage: 3
    source: "outputs/3_Financial_Features"
    file_pattern: "firm_controls_{year}.parquet"
    column: "EPS_Growth"
    description: "EPS growth rate (year-over-year)"

  earnings_surprise:
    stage: 3
    source: "outputs/3_Financial_Features"
    file_pattern: "firm_controls_{year}.parquet"
    column: "SurpDec"
    description: "Earnings surprise decile (-5 to +5)"

  # ===========================================================================
  # CCCL Instrument (B.4 Liquidity)
  # ===========================================================================
  # Source: inputs/CCCL_instrument/instrument_shift_intensity_2005_2022.parquet
  # Firm-year level instrument for IV regression; merges on gvkey + year.

  cccl_instrument:
    stage: input
    source: "inputs/CCCL_instrument"
    file_name: "instrument_shift_intensity_2005_2022.parquet"
    column: "shift_intensity_sale_ff48"
    merge_key: "gvkey + year"
    description: "CCCL sales-weighted shift-intensity instrument (FF48 classification)"

  # ===========================================================================
  # H1 — Cash Holdings Regression: Weak Modal linguistic variables (Stage 2)
  # ===========================================================================

  manager_qa_weak_modal:
    stage: 2
    source: "outputs/2_Textual_Analysis/2.2_Variables"
    file_pattern: "linguistic_variables_{year}.parquet"
    column: "Manager_QA_Weak_Modal_pct"
    description: "Manager Q&A weak modal verbs as % of total words"

  ceo_qa_weak_modal:
    stage: 2
    source: "outputs/2_Textual_Analysis/2.2_Variables"
    file_pattern: "linguistic_variables_{year}.parquet"
    column: "CEO_QA_Weak_Modal_pct"
    description: "CEO Q&A weak modal verbs as % of total words"

  manager_pres_weak_modal:
    stage: 2
    source: "outputs/2_Textual_Analysis/2.2_Variables"
    file_pattern: "linguistic_variables_{year}.parquet"
    column: "Manager_Pres_Weak_Modal_pct"
    description: "Manager Presentation weak modal verbs as % of total words"

  ceo_pres_weak_modal:
    stage: 2
    source: "outputs/2_Textual_Analysis/2.2_Variables"
    file_pattern: "linguistic_variables_{year}.parquet"
    column: "CEO_Pres_Weak_Modal_pct"
    description: "CEO Presentation weak modal verbs as % of total words"

  # ===========================================================================
  # H1 — Cash Holdings Regression: Compustat-engine variables
  # ===========================================================================
  # All 5 are computed by the shared CompustatEngine (no separate source path —
  # derived from inputs/comp_na_daily_all/comp_na_daily_all.parquet).

  cash_holdings:
    stage: input
    source: "inputs/comp_na_daily_all"
    column: "CashHoldings"
    formula: "cheq / atq"
    description: "Cash and short-term investments as fraction of total assets (Compustat)"

  tobins_q:
    stage: input
    source: "inputs/comp_na_daily_all"
    column: "TobinsQ"
    formula: "(atq + cshoq*prccq - ceqq) / atq"
    description: "Tobin's Q: (book assets + market equity - book equity) / book assets (Compustat; Chung & Pruitt 1994 approximation)"

  capex_intensity:
    stage: input
    source: "inputs/comp_na_daily_all"
    column: "CapexAt"
    formula: "capxy_Q4 / atq  (Q4-only full-year capxy joined back to all quarters by gvkey+fyearq)"
    description: "Annual capital expenditures as fraction of total assets (Compustat; capxy Q4 full-year value to avoid YTD cumulation bias)"

  dividend_payer:
    stage: input
    source: "inputs/comp_na_daily_all"
    column: "DividendPayer"
    formula: "(dvy_Q4 > 0).astype(float)  (Q4-only full-year dvy joined back to all quarters by gvkey+fyearq)"
    description: "Binary: 1 if firm paid common dividends in the fiscal year (Compustat; dvy Q4 full-year value; ~45% payers)"

  ocf_volatility:
    stage: input
    source: "inputs/comp_na_daily_all"
    column: "OCF_Volatility"
    formula: "rolling 5-year std (min 3 obs) of (oancfy / atq) per gvkey, annual panel (last obs per gvkey-fyearq)"
    description: "Operating cash flow volatility: rolling 5yr std of OCF/assets (Compustat; matches v2 design)"

  # ===========================================================================
  # H2 — Investment Efficiency Regression: Compustat-engine variables
  # ===========================================================================
  # All 3 are computed by the shared CompustatEngine via _compute_biddle_residual()
  # (no separate source path — derived from inputs/comp_na_daily_all/comp_na_daily_all.parquet).
  # Biddle et al. (2009, JAE) specification: annual Q4-only panel, FF48 cells, min 20 obs.

  investment_residual:
    stage: input
    source: "inputs/comp_na_daily_all"
    column: "InvestmentResidual"
    formula: "Biddle (2009): (capxy+xrdy+aqcy-sppey)/at_lag; residual from FF48-year OLS: Investment ~ TobinQ_lag + SalesGrowth_lag; min 20 obs per cell"
    description: "Abnormal investment deviation; > 0 = overinvestment, < 0 = underinvestment"

  cash_flow:
    stage: input
    source: "inputs/comp_na_daily_all"
    column: "CashFlow"
    formula: "oancfy / atq  (Q4-only annual, joined back to all quarters by gvkey+fyearq)"
    description: "Operating cash flow as fraction of total assets (Compustat)"

  sales_growth:
    stage: input
    source: "inputs/comp_na_daily_all"
    column: "SalesGrowth"
    formula: "(saleq_Q4 - saleq_Q4_lag) / |saleq_Q4_lag|  (Q4-only annual)"
    description: "Year-over-year revenue growth from annual Q4 panel (Compustat)"

  # ===========================================================================
  # Takeover Indicator (B.5 Takeover Hazards)
  # ===========================================================================
  # Source: inputs/SDC/sdc-ma-merged.parquet
  # Firm-level (gvkey key, not file_name). Linked via CUSIP6.

  takeover_indicator:
    stage: input
    source: "inputs/SDC"
    file_name: "sdc-ma-merged.parquet"
    columns:
      - Takeover
      - Takeover_Type
      - Takeover_Date
      - Takeover_Attitude
    merge_key: "gvkey via cusip6"
    description: "Takeover event indicators from SDC M&A data (firm-level)"

# =============================================================================
# NOTE: Hypothesis test parameters (min_calls, sample FF12 codes, output paths)
# are currently hardcoded in each test script's CONFIG dict. The section below
# is intentionally omitted to avoid dead config that diverges from the code.
# If a config-driven runner is added in future, document parameters here.
# =============================================================================



  # ===========================================================================
  # H3 — Payout Policy Regression: Compustat-engine variables
  # ===========================================================================

  div_stability:
    stage: input
    source: "inputs/comp_na_daily_all"
    column: "div_stability"
    formula: "-StdDev(Delta DPS) / |Mean(DPS)| over trailing 5 years"
    description: "Dividend policy stability (H3 DV1)"

  payout_flexibility:
    stage: input
    source: "inputs/comp_na_daily_all"
    column: "payout_flexibility"
    formula: "% of years with |Delta DPS| > 5% of prior DPS (trailing 5 years)"
    description: "Payout flexibility (H3 DV2)"

  earnings_volatility:
    stage: input
    source: "inputs/comp_na_daily_all"
    column: "earnings_volatility"
    formula: "StdDev(annual EPS) over trailing 5 years"
    description: "Earnings volatility (H3 control)"

  fcf_growth:
    stage: input
    source: "inputs/comp_na_daily_all"
    column: "fcf_growth"
    formula: "(FCF_t - FCF_t-1) / |FCF_t-1| where FCF = (oancfy - capxy) / atq"
    description: "Free cash flow growth (H3 control)"

  firm_maturity:
    stage: input
    source: "inputs/comp_na_daily_all"
    column: "firm_maturity"
    formula: "req / seqq"
    description: "Firm maturity (H3 control)"

  is_div_payer_5yr:
    stage: input
    source: "inputs/comp_na_daily_all"
    column: "is_div_payer_5yr"
    formula: "max(dps > 0) over trailing 5 years"
    description: "Flag indicating dividend payment in past 5 years (H3 filter)"

  # ===========================================================================
  # H5 — Analyst Forecast Dispersion Regression: IBES variables
  # ===========================================================================

  dispersion_lead:
    stage: input
    source: "inputs/tr_ibes"
    column: "dispersion_lead"
    formula: "STDEV / |MEANEST| at t+1 (from IBES _ibes_engine)"
    description: "Analyst forecast dispersion for the following quarter (H5 DV)"

  prior_dispersion:
    stage: input
    source: "inputs/tr_ibes"
    column: "prior_dispersion"
    formula: "STDEV / |MEANEST| at t (from IBES _ibes_engine)"
    description: "Analyst forecast dispersion for the current quarter (H5 Control)"

  earnings_surprise_ratio:
    stage: input
    source: "inputs/tr_ibes"
    column: "earnings_surprise_ratio"
    formula: "|ACTUAL - MEANEST| / |MEANEST| (from IBES _ibes_engine)"
    description: "Absolute earnings surprise magnitude (H5 Control)"

  loss_dummy:
    stage: input
    source: "inputs/comp_na_daily_all"
    column: "loss_dummy"
    formula: "1 if niq < 0 else 0"
    description: "Loss indicator variable (H5 Control)"

  # ===========================================================================
  # H6 — CCCL SEC Scrutiny: Shift-Share Instrument
  # ===========================================================================

  cccl_instrument_mkvalt:
    stage: input
    source: "inputs/CCCL_instrument"
    column: "shift_intensity_mkvalt_ff48"
    formula: "Market-value weighted shift-share instrument (CCCL t-1 proxy)"
    description: "CCCL SEC Scrutiny exposure (H6 main IV)"

  # ===========================================================================
  # H7 — Illiquidity Regression: CRSP variables
  # ===========================================================================

  amihud_illiq:
    stage: input
    source: "inputs/CRSP_DSF"
    column: "amihud_illiq"
    formula: "mean(|RET| / (VOL * |PRC|)) * 1e6 across inter-call window"
    description: "Amihud (2002) illiquidity ratio (H7 dependent variable)"

  # ===========================================================================
  # H8 — Policy Risk: Moderation of Vagueness on Abnormal Investment
  # ===========================================================================

  style_frozen:
    stage: constructed
    source: "outputs/4.1.1_CeoClarity"
    column: "style_frozen"
    formula: "ClarityCEO assigned via frozen constraint (calls <= fy_end)"
    description: "Time-invariant CEO clarity score assigned to firm-year (H8 moderator)"

  prisk_fy:
    stage: input
    source: "inputs/FirmLevelRisk"
    column: "PRiskFY"
    formula: "mean(PRisk quarters) where cal_q_end in (fy_end - 366d, fy_end]"
    description: "Hassan et al. (2019) fiscal-year policy risk exposure (H8 IV)"
